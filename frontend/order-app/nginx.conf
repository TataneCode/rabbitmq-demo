server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST → OrderProducer
    location /orders {
        proxy_pass http://order-producer:8080;
        proxy_set_header Host $host;
    }

    # Proxy WebSocket STOMP → RabbitMQ web-stomp
    location /ws {
        proxy_pass http://rabbitmq:15674/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
